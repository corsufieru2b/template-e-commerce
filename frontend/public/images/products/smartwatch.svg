<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Montre connectee multisports</title>
  <desc id="desc">Illustration produit d'une montre connectee.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f6fa"/>
      <stop offset="100%" stop-color="#dfe5f2"/>
    </linearGradient>
    <linearGradient id="watch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f3442"/>
      <stop offset="100%" stop-color="#232833"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="1000" cy="180" r="140" fill="#c6d0eb" opacity="0.35"/>
  <circle cx="170" cy="760" r="170" fill="#cad4ec" opacity="0.35"/>

