    <rect x="170" y="510" width="140" height="150" rx="55" fill="#30374a"/>
    <rect x="70" y="120" width="340" height="430" rx="78" fill="url(#watch)"/>
    <rect x="112" y="168" width="256" height="334" rx="36" fill="#f6f8ff"/>
    <circle cx="240" cy="258" r="52" fill="#c8d8fb"/>
    <rect x="168" y="342" width="144" height="14" rx="7" fill="#c8d8fb"/>
    <rect x="146" y="376" width="188" height="18" rx="9" fill="#d6e1fb"/>
    <text x="240" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2a3854">SPORT</text>
  </g>

  <text x="600" y="840" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#2c3958">Montre Connectee</text>
